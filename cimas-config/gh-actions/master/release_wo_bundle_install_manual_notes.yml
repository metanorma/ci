# Variant of `release_wo_bundle_install.yml` for gems whose maintainers
# write GitHub Release notes by hand at release time and want to opt out
# of the auto-generated notes floor introduced in metanorma/ci#354.
#
# The only difference from the parent `release_wo_bundle_install.yml`
# template is the `release_notes: manual` input passed to the reusable
# `rubygems-release.yml` — that flag makes the reusable's
# Ensure-GitHub-Release step skip itself entirely, leaving Release
# creation + notes authoring to the maintainer.
#
# Used by opoudjis-maintained gems that also opt out of the shared
# workflow's implicit `bundle install` (currently `metanorma-utils`).
# See `release_manual_notes.yml` sibling variant for gems that keep the
# shared bundle-install path.
#
# To switch from opt-out back to the auto-notes floor: change the
# cimas.yml mapping for this gem from
# `master/release_wo_bundle_install_manual_notes.yml` back to
# `master/release_wo_bundle_install.yml`. No content edit needed.
#
# See metanorma/ci#354 for the rationale.

name: release

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next release version. Possible values: x.y.z, major, minor, patch (or pre|rc|etc).
          Also, you can pass 'skip' to skip 'git tag' and do 'gem push' for the current version
        required: true
        default: 'skip'
  repository_dispatch:
    types: [ do-release ]

# Least-privilege ceiling for the called rubygems-release.yml: its release job
# needs contents:write (git tag push) and id-token:write (OIDC Trusted Publishing).
permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: metanorma/ci/.github/workflows/rubygems-release.yml@main
    with:
      next_version: ${{ github.event.inputs.next_version }}
      release_command: rake release
      bundler_cache: false
      post_install: gem install bundler rake rspec
      # Opt out of the auto-generated GitHub Release notes floor added in
      # metanorma/ci#354. Notes are written by hand at release time; the
      # workflow skips the ensure-release step entirely and the maintainer
      # creates the Release with their own notes.
      release_notes: manual
    secrets:
      rubygems-api-key: ${{ secrets.METANORMA_CI_RUBYGEMS_API_KEY }}
      pat_token: ${{ secrets.METANORMA_CI_PAT_TOKEN }}
