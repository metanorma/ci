  # DEPRECATED pubid-family entries — all removed. Timeline:
  # - 2026-06-29 (refs #274, #300 Gap 3): 11 standalone `pubid-*` repos removed
  #   as superseded by the `pubid` monorepo.
  # - 2026-07-12: `pubid-etsi` removed as the same class (deprecation-status
