  # - 2026-07-17: `pubid` (the monorepo) removed after the Wed 2026-07-15
  #   drift-audit run surfaced that the repo was transferred out of the
  #   metanorma org to a new `pubid/pubid` org. opoudjis's decision: no
  #   cross-org cimas maintenance; pubid is Andrej's territory and is fine
  #   to run independently (same posture as the relaton-* family).
  # Gems on rubygems for the removed pubid-* set are published from
  # `pubid/pubid:archived-gems/<name>/` at 1.15.x; the standalone repos are
  # frozen (0.7.x from 2024-08, or pubid-etsi 0.1.0 from 2024-02).
  #
  # Full removed set:
  #   pubid-core, pubid-ieee, pubid-iso, pubid-iec, pubid-bsi, pubid-cen,
  #   pubid-jis, pubid-itu, pubid-ccsds, pubid-nist, pubid-plateau
  #     (11 entries removed 2026-06-29)
  #   pubid-etsi (removed 2026-07-12 — same class; standalone repo last commit
  #               2024-02-25 "Bump to 0.1.0", rubygems 1.15.20 published from
  #               `pubid/pubid:archived-gems/pubid-etsi/`)
  #   pubid (removed 2026-07-17 — monorepo transferred to `pubid/pubid` org,
  #          surfaced by the Wed 2026-07-15 drift-audit run; opoudjis directive
  #          to stop cross-org cimas maintenance)
