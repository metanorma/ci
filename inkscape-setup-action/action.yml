name: 'inkscape-setup-action'
description: 'Installs inkscape for all OSes'
inputs:
  filepath:
    description: 'Full path to native executable (can be skipped in favor of libname+directory)'
    required: false
runs:
  using: "composite"
  steps:
    - shell: python
      run: |
        import sys, os
        sys.path.insert(0, os.path.join(os.environ['GITHUB_ACTION_PATH'], '..', '_shared'))
        from tool_runner import (
            get_platform_name,
            run_commands,
            run_commands_with_retry,
        )

        platform_name = get_platform_name()

        win_prefix = "C:\\Program Files\\Inkscape\\bin"

        version = {
          "Darwin": None,
          "Windows": None,
          "Ubuntu": "1:1.4*",
          "Linux": "https://inkscape.org/gallery/item/53678/Inkscape-e7c3feb-x86_64.AppImage"
        }.get(platform_name, None)

        if platform_name == "Windows":
          run_commands_with_retry([
            "choco install --no-progress -y inkscape --verbose",
          ])
          run_commands([
            "echo {}>> {}".format(win_prefix, os.environ["GITHUB_PATH"]),
            "\"{}\\inkscape\" --version".format(win_prefix),
          ])
        elif platform_name == "Ubuntu":
          run_commands([
            "sudo install -d -m 0755 /etc/apt/keyrings",
          ])
          run_commands_with_retry([
            "curl -fsSL "
              "'https://keyserver.ubuntu.com/pks/lookup"
              "?op=get&search=0x56BDFFD2F1C96B3D1575E3B85C9A0B86CD2FCB38' "
              "| sudo gpg --dearmor -o /etc/apt/keyrings/inkscape-dev-stable.gpg",
            ". /etc/os-release && echo "
              "\"deb [signed-by=/etc/apt/keyrings/inkscape-dev-stable.gpg] "
              "https://ppa.launchpadcontent.net/inkscape.dev/stable/ubuntu "
              "$UBUNTU_CODENAME main\" "
              "| sudo tee /etc/apt/sources.list.d/inkscape-dev-stable.list",
            "sudo apt update",
            "sudo apt install -y inkscape={}".format(version),
          ])
          run_commands([
            "which inkscape",
            "inkscape --version",
          ])
        elif platform_name == "Linux":
          run_commands_with_retry([
            "wget {} -O /usr/local/bin/inkscape".format(version),
          ])
          run_commands([
            "sudo chmod +x /usr/local/bin/inkscape",
            "inkscape --version",
          ])
        elif platform_name == "Darwin":
          os.environ["HOMEBREW_CURL_RETRIES"] = "3"
          os.environ["HOMEBREW_NO_AUTO_UPDATE"] = "1"
          run_commands_with_retry([
            "HOMEBREW_CASK_OPTS='--no-quarantine' brew install --cask inkscape",
          ])
          run_commands([
            "inkscape --version",
          ])
        else:
          run_commands([
            "echo 'Unsupported platform: {}'".format(platform_name),
            "exit 1",
          ])

    - name: Update eps_input.inx to allow noninteractive EPS processing
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo python ${GITHUB_ACTION_PATH//\\//}/fix_eps_input_autorotate_param.py
        else
          python ${GITHUB_ACTION_PATH//\\//}/fix_eps_input_autorotate_param.py
        fi
      shell: bash
