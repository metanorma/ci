name: dependent-rake

on:
  workflow_call:
    inputs:
      repos-json-file:
        description: json file with array of gems to test
        type: string
        default: .github/workflows/dependent-repos.json
      command:
        description: test command for dependent gem
        type: string
        default: bundle exec rake
      matrix_os:
        description: define the operating systems on which to execute jobs
        type: string

    secrets:
      pat_token:
        required: false

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6

    - id: build-matrix
      run: |
        wget https://raw.githubusercontent.com/metanorma/ci/main/.github/workflows/ruby-matrix.json
        # remove 'middle' & 'experimental' versions
        echo "$(jq 'del(.ruby[1, 2])' ruby-matrix.json)" > ruby-matrix.json
        if [ -n "${{ inputs.matrix_os }}" ]; then
          echo "$(jq '.os = ${{inputs.matrix_os}}' ruby-matrix.json)" > ruby-matrix.json
        fi
        echo "matrix=$(jq -s add ${{ inputs.repos-json-file }} ruby-matrix.json | tr '\n' ' ')" >> $GITHUB_OUTPUT

  rake:
    name: ${{ matrix.repo }} ${{ matrix.ruby.version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
    - build-matrix

    concurrency:
      group: '${{ matrix.repo }}-${{ matrix.os }}-${{ matrix.ruby.version }}-${{ github.head_ref || github.ref_name }}'
      cancel-in-progress: true

    continue-on-error: ${{ matrix.experimental || matrix.ruby.experimental }}
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        token: ${{ secrets.pat_token || github.token }}

    - uses: actions/checkout@v6
      with:
        submodules: recursive
        repository: ${{ matrix.repo }}
        path: dependent
        fetch-depth: 1
        token: ${{ secrets.pat_token || github.token }}

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby.version }}
        rubygems: ${{ matrix.ruby.rubygems }}
        bundler-cache: true
        working-directory: dependent

    - name: Replace rubygems's gem with git's one
      run: |
        gem_name="${{ github.event.repository.name }}"
        for f in *.gemspec; do
          [ -f "$f" ] || continue
          ruby -e '
            name = ARGV[0]; file = ARGV[1]
            lines = File.readlines(file)
            keep = []
            skip = false
            lines.each do |line|
              if line.include?(name)
                skip = true
                keep << line unless line.strip.start_with?("#")
                next
              end
              if skip && line.match?(/^\s*(ref|branch|tag|commit|github|git)\s*:/)
                next
              end
              skip = false
              keep << line
            end
            File.write(file, keep.join)
            puts "#{name} removed from #{file}"
          ' "$gem_name" "$f"
        done
        if [ -f Gemfile ]; then
          ruby -e '
            name = ARGV[0]
            lines = File.readlines("Gemfile")
            keep = []
            skip = false
            lines.each do |line|
              if line.include?(name)
                skip = true
                next
              end
              if skip && line.match?(/^\s*(ref|branch|tag|commit|github|git)\s*:/)
                next
              end
              skip = false
              keep << line
            end
            File.write("Gemfile", keep.join)
            puts "#{name} removed from Gemfile"
          ' "$gem_name"
        fi
        if [ -f Gemfile.lock ]; then
          rm Gemfile.lock
          echo "Gemfile.lock dropped"
        fi
        git diff || true
        bundle add "${gem_name}" --path ..
      working-directory: dependent

    - run: ${{ inputs.command }}
      working-directory: dependent
