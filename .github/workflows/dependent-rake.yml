name: dependent-rake

on:
  workflow_call:
    inputs:
      repos-json-file:
        description: json file with array of gems to test
        type: string
        default: .github/workflows/dependent-repos.json
      command:
        description: test command for dependent gem
        type: string
        default: bundle exec rake
      matrix_os:
        description: define the operating systems on which to execute jobs
        type: string
      before-setup-ruby:
        description: Command to execute before setting up Ruby
        type: string
        default: ''
        required: false
      after-setup-ruby:
        description: Command to execute after setting up Ruby
        type: string
        default: ''
        required: false
      shell:
        description: Shell to use for running commands
        type: string
        default: 'bash'
        required: false
      setup-inkscape:
        description: Whether to set up Inkscape for tests that require it
        type: boolean
        default: false
      setup-tools:
        description: 'Comma-separated list of tools to set up: inkscape, ghostscript, graphviz, libreoffice, xml2rfc, exiftool, ffmpeg, imagemagick'
        type: string
        default: ''
        required: false

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6

    - id: build-matrix
      run: |
        wget https://raw.githubusercontent.com/metanorma/ci/main/.github/workflows/ruby-matrix.json
        # remove 'middle' & 'experimental' versions
        echo "$(jq 'del(.ruby[1, 2])' ruby-matrix.json)" > ruby-matrix.json
        if [ -n "${{ inputs.matrix_os }}" ]; then
          echo "$(jq '.os = ${{inputs.matrix_os}}' ruby-matrix.json)" > ruby-matrix.json
        fi
        echo "matrix=$(jq -s add ${{ inputs.repos-json-file }} ruby-matrix.json | tr '\n' ' ')" >> $GITHUB_OUTPUT

  rake:
    name: ${{ matrix.repo }} ${{ matrix.ruby.version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
    - build-matrix

    concurrency:
      group: '${{ matrix.repo }}-${{ matrix.os }}-${{ matrix.ruby.version }}-${{ github.head_ref || github.ref_name }}'
      cancel-in-progress: true

    continue-on-error: ${{ matrix.experimental || matrix.ruby.experimental }}
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    defaults:
      run:
        shell: ${{ inputs.shell }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - uses: actions/checkout@v6
      with:
        submodules: recursive
        repository: ${{ matrix.repo }}
        path: dependent
        fetch-depth: 1

    - if: ${{ inputs.before-setup-ruby != '' }}
      run: ${{ inputs.before-setup-ruby }}
      working-directory: dependent

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby.version }}
        rubygems: ${{ matrix.ruby.rubygems }}
        bundler-cache: true
        working-directory: dependent

    - if: ${{ inputs.after-setup-ruby != '' }}
      run: ${{ inputs.after-setup-ruby }}
      working-directory: dependent

    - name: Replace rubygems's gem with git's one
      shell: python
      run: |
        import fileinput
        import glob
        import sys
        import os
        gem_name = '${{ github.event.repository.name }}'
        if glob.glob('*.gemspec'):
          gemspec = glob.glob('*.gemspec')[0]
          with fileinput.FileInput(gemspec, inplace=True) as file:
            for line in file:
              if gem_name not in line:
                print(line, end='')
          print("'{}' removed from {}".format(gem_name, gemspec))
        if os.path.exists("Gemfile"):
          with fileinput.FileInput("Gemfile", inplace=True) as file:
            for line in file:
              if gem_name not in line:
                print(line, end='')
          print("'{}' removed from Gemfile".format(gem_name))
        if os.path.exists("Gemfile.lock"):
          os.remove("Gemfile.lock")
          print("Gemfile.lock dropped")
        print("> git diff")
        sys.stdout.flush()
        os.system("git diff")
        print("> bundle add {} --path ..".format(gem_name))
        sys.stdout.flush()
        os.system("bundle add {} --path ..".format(gem_name))
      working-directory: dependent

    - if: inputs.setup-inkscape || contains(inputs.setup-tools, 'inkscape')
      uses: metanorma/ci/inkscape-setup-action@main

    - if: contains(inputs.setup-tools, 'ghostscript')
      uses: metanorma/ci/ghostscript-setup-action@main

    - if: contains(inputs.setup-tools, 'graphviz')
      uses: metanorma/ci/graphviz-setup-action@main

    - if: contains(inputs.setup-tools, 'libreoffice')
      uses: metanorma/ci/libreoffice-setup-action@main

    - if: contains(inputs.setup-tools, 'xml2rfc')
      uses: metanorma/ci/xml2rfc-setup-action@main

    # TODO: Revert to main branch of exiftool-setup-action when merging to main branch
    - if: contains(inputs.setup-tools, 'exiftool')
      uses: metanorma/ci/exiftool-setup-action@setup-tools-in-dependent-rake

    - if: contains(inputs.setup-tools, 'ffmpeg')
      uses: metanorma/ci/ffmpeg-setup-action@setup-tools-in-dependent-rake

    - if: contains(inputs.setup-tools, 'imagemagick')
      uses: metanorma/ci/imagemagick-setup-action@setup-tools-in-dependent-rake

    - run: ${{ inputs.command }}
      working-directory: dependent
