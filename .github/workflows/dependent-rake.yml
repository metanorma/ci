name: dependent-rake

on:
  workflow_call:
    inputs:
      repos-json-file:
        description: json file with array of gems to test
        type: string
        default: .github/workflows/dependent-repos.json
      command:
        description: test command for dependent gem
        type: string
        default: bundle exec rake
      matrix_os:
        description: define the operating systems on which to execute jobs
        type: string
      before-setup-ruby:
        description: Command to execute before setting up Ruby
        type: string
        default: ''
        required: false
      after-setup-ruby:
        description: Command to execute after setting up Ruby
        type: string
        default: ''
        required: false
      shell:
        description: Shell to use for running commands
        type: string
        default: 'bash'
        required: false
      setup-inkscape:
        description: 'Legacy flag — use setup-tools instead'
        type: boolean
        default: false
      setup-tools:
        description: >-
          Comma-separated list of tools to install (no spaces):
          inkscape,ghostscript,graphviz,libreoffice,xml2rfc,exiftool,ffmpeg,imagemagick
        type: string
        default: ''
        required: false

    secrets:
      pat_token:
        required: false

permissions:
  contents: read

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6

    - id: build-matrix
      run: |
        wget https://raw.githubusercontent.com/metanorma/ci/main/.github/workflows/ruby-matrix.json
        # remove 'middle' & 'experimental' versions
        echo "$(jq 'del(.ruby[1, 2])' ruby-matrix.json)" > ruby-matrix.json
        if [ -n "${{ inputs.matrix_os }}" ]; then
          echo "$(jq '.os = ${{inputs.matrix_os}}' ruby-matrix.json)" > ruby-matrix.json
        fi
        echo "matrix=$(jq -s add ${{ inputs.repos-json-file }} ruby-matrix.json | tr '\n' ' ')" >> $GITHUB_OUTPUT

  rake:
    name: ${{ matrix.repo }} ${{ matrix.ruby.version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
    - build-matrix

    concurrency:
      group: '${{ matrix.repo }}-${{ matrix.os }}-${{ matrix.ruby.version }}-${{ github.head_ref || github.ref_name }}'
      cancel-in-progress: true

    continue-on-error: ${{ matrix.experimental || matrix.ruby.experimental }}
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    defaults:
      run:
        shell: ${{ inputs.shell }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        token: ${{ secrets.pat_token || github.token }}

    - uses: actions/checkout@v6
      with:
        submodules: recursive
        repository: ${{ matrix.repo }}
        path: dependent
        fetch-depth: 1
        token: ${{ secrets.pat_token || github.token }}

    - if: ${{ inputs.before-setup-ruby != '' }}
      run: ${{ inputs.before-setup-ruby }}
      working-directory: dependent

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby.version }}
        rubygems: ${{ matrix.ruby.rubygems }}
        bundler-cache: true
        working-directory: dependent

    - if: ${{ inputs.after-setup-ruby != '' }}
      run: ${{ inputs.after-setup-ruby }}
      working-directory: dependent

    - name: Replace rubygems's gem with git's one
      shell: python
      run: |
        import fileinput
        import glob
        import subprocess
        import sys
        import os
        gem_name = '${{ github.event.repository.name }}'
        if glob.glob('*.gemspec'):
          gemspec = glob.glob('*.gemspec')[0]
          with fileinput.FileInput(gemspec, inplace=True) as file:
            for line in file:
              if gem_name not in line:
                print(line, end='')
          print("'{}' removed from {}".format(gem_name, gemspec))
        if os.path.exists("Gemfile"):
          with fileinput.FileInput("Gemfile", inplace=True) as file:
            for line in file:
              if gem_name not in line:
                print(line, end='')
          print("'{}' removed from Gemfile".format(gem_name))
        if os.path.exists("Gemfile.lock"):
          os.remove("Gemfile.lock")
          print("Gemfile.lock dropped")
        print("> git diff")
        sys.stdout.flush()
        subprocess.run(["git", "diff"], check=False, shell=True)
        print("> bundle add {} --path ..".format(gem_name))
        sys.stdout.flush()
        subprocess.run(["bundle", "add", gem_name, "--path", ".."], check=True, shell=True)
      working-directory: dependent

    - uses: metanorma/ci/tool-setup-action@main
      with:
        setup-tools: ${{ inputs.setup-tools }}
        setup-inkscape: ${{ inputs.setup-inkscape }}

    - run: ${{ inputs.command }}
      working-directory: dependent
