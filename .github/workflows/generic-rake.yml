name: rake

on:
  workflow_call:
    inputs:
      tests-passed-event:
        description: Name of event sent with repository-dispatch after rake tests are passed successfully
        default: 'tests-passed'
        type: string
      release-event:
        description: Name of event sent to initiate release
        default: 'do-release'
        type: string
      before-setup-ruby:
        description: Command to execute before setting up Ruby
        type: string
        default: ''
        required: false
      after-setup-ruby:
        description: Command to execute after setting up Ruby
        type: string
        default: ''
        required: false
      shell:
        description: Shell to use for running commands
        type: string
        default: 'bash'
        required: false
      setup-inkscape:
        description: 'Legacy flag — use setup-tools instead'
        type: boolean
        default: false
      setup-tools:
        description: >-
          Comma-separated list of tools to install (no spaces):
          inkscape,ghostscript,graphviz,libreoffice,xml2rfc,exiftool,ffmpeg,imagemagick
        type: string
        default: ''
        required: false
      submodules:
        description: 'Checkout submodules: true, false, or recursive'
        type: string
        default: 'recursive'
        required: false
      private-fonts:
        description: 'Set to true to enable private fonts via fontist-repo-setup'
        type: string
        default: 'false'
        required: false
      private-fonts-username:
        description: 'Username for private fonts repository'
        type: string
        default: 'metanorma-ci'
        required: false
      choco-cache:
        description: 'Whether to set up Chocolatey cache on Windows'
        type: boolean
        default: false
        required: false
    secrets:
      pat_token:
        required: false

permissions:
  contents: read

jobs:
  prepare:
    uses: metanorma/ci/.github/workflows/prepare-rake.yml@main

  rake:
    name: Test on Ruby ${{ matrix.ruby.version }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    needs: prepare
    if: needs.prepare.outputs.push-for-tag != 'true'

    concurrency:
      group: '${{ github.workflow }}-${{ matrix.os }}-${{ matrix.ruby.version }}-${{ github.head_ref || github.ref_name }}'
      cancel-in-progress: true

    continue-on-error: ${{ matrix.ruby.experimental }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    defaults:
      run:
        shell: ${{ inputs.shell }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.pat_token || github.token }}
          submodules: ${{ inputs.submodules }}

      - if: matrix.os == 'windows-latest'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - if: ${{ inputs.before-setup-ruby != '' }}
        run: ${{ inputs.before-setup-ruby }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby.version }}
          bundler-cache: true
          rubygems: ${{ matrix.ruby.rubygems }}
          bundler: ${{ matrix.ruby.bundler }}

      - if: ${{ inputs.after-setup-ruby != '' }}
        run: ${{ inputs.after-setup-ruby }}

      - if: ${{ inputs.choco-cache && runner.os == 'Windows' }}
        uses: metanorma/ci/choco-cache-action@main

      - uses: metanorma/ci/tool-setup-action@main
        with:
          setup-tools: ${{ inputs.setup-tools }}
          setup-inkscape: ${{ inputs.setup-inkscape }}

      - if: inputs.private-fonts == 'true'
        uses: metanorma/ci/fontist-repo-setup@main
        with:
          private-fonts-pat: ${{ secrets.pat_token }}
          private-fonts-username: ${{ inputs.private-fonts-username }}
          use-bundler: 'true'

      - run: bundle exec rake

  tests-passed:
    needs: rake
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        name: Tests passed
        with:
          token: ${{ secrets.pat_token || github.token }}
          repository: ${{ github.repository }}
          event-type: ${{ inputs.tests-passed-event }}
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "type": "${{ inputs.tests-passed-event }}"}'

      - if: startsWith(github.ref, 'refs/tags/v')
        name: Repository ready for release
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.pat_token || github.token }}
          repository: ${{ github.repository }}
          event-type: ${{ inputs.release-event }}
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "type": "${{ inputs.release-event }}"}'
