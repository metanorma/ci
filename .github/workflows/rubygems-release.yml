name: release

on:
  workflow_call:
    inputs:
      next_version:
        description: |
          Next release version. Possible values: x.y.z, major, minor, patch (or pre|rc|etc).
          Pass 'skip' to skip version bump and release the current gemspec version.
        required: true
        type: string
      gated:
        description: |
          Defer gem publish until tests pass via the do-release chain.
          - true (default): workflow_dispatch bumps+tags only; publish happens after
            tests pass via repository_dispatch (do-release). Requires a pat_token
            to trigger downstream workflows. Falls back to immediate publish when
            no pat_token is configured.
          - false: workflow_dispatch bumps+tags+publishes immediately. The idempotent
            guard handles the inevitable second push from do-release.
        type: boolean
        default: true
      event_name:
        description: 'deprecated github.event_name used instead'
        required: false
        type: string
      release_command:
        description: 'command to release gem (only used with rubygems-api-key authentication)'
        required: false
        type: string
        default: bundle exec rake release
      bundler_cache:
        description: |
          DEPRECATED — IGNORED as of 2026-06-28 (see metanorma/ci#314).
          The release job now hardcodes bundler-cache: false because this
          workflow removes Gemfile.lock before bump, which combined with
          ruby/setup-ruby's restore-key fallback caused stale-cache restores
          and silent missing-gem failures (e.g. metanorma-cli v1.16.6
          failed with "Bundler::GemNotFound: metanorma-nist" because the
          gem was never actually installed despite being in the Gemfile).
          Cost of fresh install: ~30 sec per release.
        required: false
        type: boolean
        default: false
      post_install:
        description: 'command to execute after bundle install'
        required: false
        type: string
        default: ''
      submodules:
        description: 'command to load submodules'
        required: false
        type: boolean
        default: true
      role_to_assume:
        description: 'OIDC Role ID from RubyGems.org for Trusted Publishing (optional - auto-discovered if not provided)'
        required: false
        type: string
      environment:
        description: 'GitHub environment name for protection rules (e.g., "release" for required approvers)'
        required: false
        type: string
        default: ''
    secrets:
      rubygems-api-key:
        required: false
      pat_token:
        required: false

jobs:
  # Fail-fast preflight: run a fresh `bundle install` BEFORE bump/tag/rake so
  # any dep-resolution issue (e.g. a GH Packages auth slip, an unsatisfiable
  # version constraint, a missing private gem) surfaces in ~90 seconds rather
  # than after the 2h+ rake matrix. Skipped on `repository_dispatch`/`push`
  # events because those code paths already passed preflight in the preceding
  # `workflow_dispatch` leg; running it again would just duplicate work.
  # See release-chain.md and metanorma/ci#309 for the maintainer-experience
  # rationale (the v1.16.6 case that motivated this: 2h27m wasted to learn
  # bundle install failed at layer 7).
  preflight:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is needed for the OIDC Trusted-Publisher preflight
      # exchange step below (which runs only when neither API-key nor
      # explicit role_to_assume is configured).
      id-token: write
    env:
      HAVE_PAT_TOKEN: ${{ secrets.pat_token != '' }}
      HAS_API_KEY: ${{ secrets.rubygems-api-key != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.pat_token || github.token }}

      - if: ${{ env.HAVE_PAT_TOKEN == 'true' }}
        uses: metanorma/ci/gh-rubygems-setup-action@main
        with:
          token: ${{ secrets.pat_token }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Fresh bundle resolve (catches what would otherwise fail at layer 7)
        run: |
          rm -f Gemfile.lock
          bundle install --jobs 4 --retry 3

      - name: Gem build (catches gemspec errors that would fail at layer 9)
        run: |
          gemspec=$(ls *.gemspec | head -1)
          if [ -z "$gemspec" ]; then
            echo "::error::No .gemspec file found in repo root"
            exit 1
          fi
          echo "Building $gemspec to verify gemspec validity..."
          gem build "$gemspec"
          rm -f *.gem  # don't carry the artefact forward

      - name: Verify publish credentials available
        env:
          ROLE_TO_ASSUME: ${{ inputs.role_to_assume }}
        run: |
          if [ "$HAS_API_KEY" = "true" ]; then
            echo "✓ rubygems-api-key configured; publish will use API-key path"
          elif [ -n "$ROLE_TO_ASSUME" ]; then
            echo "✓ OIDC role configured (role_to_assume input set); publish will use Trusted Publishing path"
          else
            echo "ℹ No API key or explicit role_to_assume; verifying OIDC Trusted Publisher config via preflight exchange (below)..."
          fi

      # Preserve preflight's fail-fast safety net for the OIDC auto-discovery
      # path. If neither an API key nor an explicit role_to_assume is
      # configured, the ONLY viable publish path is OIDC Trusted Publishing
      # with auto-discovery via rubygems/configure-rubygems-credentials.
      # Attempt that exchange NOW in preflight. If the caller repo does not
      # have a Trusted Publisher trust config on rubygems.org matching this
      # workflow, the action fails here in ~30 seconds rather than at
      # layer 9 after the 2h+ rake matrix — preserving the preflight's whole
      # point per metanorma/ci#309 (catch layer-9 failures before wasting the
      # rake cycle). Credentials written to ~/.gem/credentials here are
      # ephemeral to this job; the release job re-runs the exchange with a
      # fresh id-token.
      - name: OIDC preflight — verify Trusted Publisher auto-discovery
        if: env.HAS_API_KEY == 'false' && inputs.role_to_assume == ''
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Version awareness (informational)
        run: |
          gemspec=$(ls *.gemspec | head -1)
          gem_name=$(ruby -e "puts Gem::Specification.load('$gemspec').name")
          gem_version=$(ruby -e "puts Gem::Specification.load('$gemspec').version.to_s")
          published=$(gem list --remote --exact --version "$gem_version" "$gem_name" 2>/dev/null | grep "$gem_name ($gem_version)" || true)
          if [ -n "$published" ]; then
            if [ "${{ inputs.next_version }}" = "skip" ]; then
              echo "::warning::$gem_name $gem_version is already on rubygems.org."
              echo "::warning::With next_version=skip, the idempotent guard at layer 8 will SKIP the push."
              echo "::warning::If you intended to re-trigger the chain on an existing version (e.g. to retry a failed downstream cascade), this is fine."
              echo "::warning::If you intended to ship NEW code, cancel this run and fire with next_version=patch (or major/minor) instead."
            else
              echo "ℹ️  Current gemspec version $gem_name $gem_version is already published. After bump ($(echo '${{ inputs.next_version }}')), the new version will be higher."
            fi
          else
            echo "ℹ️  $gem_name $gem_version is not on rubygems yet."
            latest=$(gem list --remote --exact "$gem_name" 2>/dev/null | grep -oE "$gem_name \([0-9.]+\)" | head -1 || echo "(not previously published)")
            echo "ℹ️  Latest published: $latest"
          fi

  release:
    # Run after preflight when preflight ran (workflow_dispatch path); run
    # directly when preflight was skipped (repository_dispatch / push paths).
    # Do NOT run if preflight ran and failed — that means a real dep issue
    # the maintainer needs to fix before any further chain layers execute.
    needs: preflight
    if: |
      always() &&
      (needs.preflight.result == 'success' || needs.preflight.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
    env:
      HAVE_PAT_TOKEN: ${{ secrets.pat_token != '' }}
      HAS_API_KEY: ${{ secrets.rubygems-api-key != '' }}
      USE_OIDC: ${{ secrets.rubygems-api-key == '' }}
      SHOULD_PUBLISH: >-
        ${{
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' &&
            (inputs.gated == false || secrets.pat_token == ''))
        }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.pat_token || github.token }}

      - if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
        run: git fetch --tags origin

      - if: ${{ env.HAVE_PAT_TOKEN == 'true' }}
        uses: metanorma/ci/gh-rubygems-setup-action@main
        with:
          token: ${{ secrets.pat_token }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          # bundler-cache hardcoded to false (ignoring inputs.bundler_cache)
          # because this workflow removes Gemfile.lock before bump, which
          # makes ruby/setup-ruby's restore-key fallback hit stale caches
          # and silently skip installing newly-added gems. See
          # metanorma/ci#314 for the root-cause analysis.
          bundler-cache: false

      - if: ${{ inputs.post_install != '' }}
        run: ${{ inputs.post_install }}

      # ============ Common git setup ============
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - run: gem install gem-release

      - name: Remove Gemfile.lock before bump
        run: rm -f Gemfile.lock

      # ============ Fresh bundle install ============
      # ruby/setup-ruby above is invoked with bundler-cache: false (see
      # metanorma/ci#314), so it does not run `bundle install` itself. We
      # need an explicit fresh install before `bundle exec rake release`
      # or it dies with Bundler::GemNotFound for anything in the Gemfile.
      # Mirrors the preflight job's fresh-resolve step (same flags).
      #
      # The release job does NOT need development or test groups — the
      # release path is `gem build` + `gem push`, not running tests. Excluding
      # those groups eliminates a class of release-blocking resolution
      # failures where a transitively-pulled dev dependency happens to be
      # unresolvable mid-rollout (metanorma/ci#258 — the metanorma-taste
      # incident where its dev dep metanorma-cli's transitive graph was in
      # flux). Skipping development and test groups closes that gap without
      # changing what's actually published.
      - name: Fresh bundle install (production groups only)
        run: |
          bundle config set --local without 'development test'
          bundle install --jobs 4 --retry 3

      # ============ Version bump (workflow_dispatch only) ============
      - name: Bump version
        if: github.event_name == 'workflow_dispatch' && inputs.next_version != 'skip'
        run: gem bump --version ${{ inputs.next_version }} --tag --push

      # ============ Gem identity ============
      # Resolved AFTER the bump so name/version/gemspec reflect the just-bumped
      # version. If resolved before the bump, the idempotency guard, build, and
      # tag-ref steps would all see the pre-bump (already-published) version,
      # making the guard skip publishing the new gem while the new tag still
      # gets pushed — a silently-unpublished release.
      - name: Resolve gem identity
        id: gem-identity
        run: |
          GEMSPEC=$(ls *.gemspec | head -1)
          GEM_NAME=$(ruby -e "puts Gem::Specification.load('${GEMSPEC}').name")
          GEM_VERSION=$(ruby -e "puts Gem::Specification.load('${GEMSPEC}').version.to_s")
          echo "name=${GEM_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${GEM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "gemspec=${GEMSPEC}" >> "$GITHUB_OUTPUT"

      # ============ Auto-tag for skip mode (gated only) ============
      # When next_version=skip and gated=true, create and push a tag from the
      # current gemspec version so the test chain fires and do-release publishes.
      - name: Tag current version (skip mode)
        if: github.event_name == 'workflow_dispatch' && inputs.next_version == 'skip' && inputs.gated == true
        run: |
          TAG="v${{ steps.gem-identity.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; pushing to trigger test chain."
          else
            git tag "$TAG"
          fi
          git push origin "$TAG"

      # ============ No-PAT fallback notice ============
      # When gated=true but no PAT is configured, tag pushes made with
      # GITHUB_TOKEN cannot trigger downstream workflows (GHA design).
      # Degrade gracefully: publish immediately with idempotent guard.
      - name: Notice — publishing immediately (no PAT)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.gated == true &&
          env.HAVE_PAT_TOKEN == 'false'
        run: |
          echo "::warning::No pat_token configured. Publishing immediately because the relay chain (bump → tag push → tests → do-release → publish) requires a PAT for tag pushes to trigger downstream workflows. To enable test-gated releases, configure a PAT token."

      # ============ Publish: API Key path ============
      - name: Idempotency guard (API key)
        if: env.SHOULD_PUBLISH == 'true' && env.HAS_API_KEY == 'true'
        uses: metanorma/ci/gem-idempotent-push-guard-action@main
        with:
          gem-name: ${{ steps.gem-identity.outputs.name }}
          gem-version: ${{ steps.gem-identity.outputs.version }}

      - if: env.SHOULD_PUBLISH == 'true' && env.HAS_API_KEY == 'true' && env.skip_push != 'true'
        name: Publish to rubygems.org (API Key)
        env:
          RUBYGEMS_API_KEY: ${{ secrets.rubygems-api-key }}
        run: |
          mkdir -p ~/.gem
          envsubst << 'EOF' > ~/.gem/credentials
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          EOF
          chmod 0600 ~/.gem/credentials
          ${{ inputs.release_command }}

      # ============ Publish: OIDC Trusted Publisher path ============
      - if: env.SHOULD_PUBLISH == 'true' && env.USE_OIDC == 'true'
        name: Configure RubyGems credentials for Trusted Publishing
        uses: rubygems/configure-rubygems-credentials@v1.0.0
        with:
          role-to-assume: ${{ inputs.role_to_assume }}

      - name: Idempotency guard (OIDC)
        if: env.SHOULD_PUBLISH == 'true' && env.USE_OIDC == 'true'
        uses: metanorma/ci/gem-idempotent-push-guard-action@main
        with:
          gem-name: ${{ steps.gem-identity.outputs.name }}
          gem-version: ${{ steps.gem-identity.outputs.version }}

      - if: env.SHOULD_PUBLISH == 'true' && env.USE_OIDC == 'true' && env.skip_push != 'true'
        name: Build and push gem (OIDC)
        run: |
          gem build *.gemspec
          mkdir -p pkg
          mv *.gem pkg/
          gem push pkg/*.gem

      - if: env.SHOULD_PUBLISH == 'true' && env.USE_OIDC == 'true' && env.skip_push != 'true'
        name: Wait for release to propagate
        run: gem exec rubygems-await pkg/*.gem

      # ============ Post-publish verification ============
      # Verify the just-published gem version is actually queryable on
      # rubygems.org. Without this check, a silent-fail in the publish
      # step (the gem push reports success but the gem isn't on rubygems
      # for whatever reason — auth scope, registry routing, partial CDN
      # propagation timing out the upstream timeout, etc.) leaves the
      # release reporting green while consumers can't `gem install` the
      # new version. See metanorma/ci#302 ("green means published"
      # observability) and metanorma/ci#314 (stale bundler-cache class).
      #
      # Polls the rubygems versions JSON every 5s up to 120s total. The
      # OIDC path already does propagation waiting via `rubygems-await`
      # above, so this poll typically returns instantly for it. The API
      # Key path has no such waiter, so this is the first verification.
      - name: Verify gem published on rubygems.org
        if: env.SHOULD_PUBLISH == 'true' && env.skip_push != 'true'
        env:
          GEM_NAME: ${{ steps.gem-identity.outputs.name }}
          GEM_VERSION: ${{ steps.gem-identity.outputs.version }}
        run: |
          echo "Polling rubygems.org for ${GEM_NAME} version ${GEM_VERSION}..."
          for i in $(seq 1 24); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              "https://rubygems.org/api/v1/versions/${GEM_NAME}.json" || true)
            if [[ "$status" == "200" ]]; then
              if curl -s "https://rubygems.org/api/v1/versions/${GEM_NAME}.json" \
                   | jq -e --arg v "$GEM_VERSION" '.[] | select(.number == $v) | .number' > /dev/null; then
                echo "✓ ${GEM_NAME} ${GEM_VERSION} confirmed live on rubygems.org"
                exit 0
              fi
            fi
            echo "  attempt $i/24: not yet visible, sleeping 5s..."
            sleep 5
          done
          echo "::error::${GEM_NAME} ${GEM_VERSION} was not visible on rubygems.org after 120s of polling."
          echo "::error::Either the publish step failed silently (the class metanorma/ci#302 was filed to surface) or rubygems propagation is unusually slow."
          echo "::error::Inspect the publish step's logs above for the actual outcome before re-running."
          exit 1

      # ============ Post-release event ============
      - name: Get current gem ref
        id: gem-tag-ref
        run: echo "value=refs/tags/v${{ steps.gem-identity.outputs.version }}" >> "$GITHUB_OUTPUT"

      # Record an ISO-8601 timestamp BEFORE dispatching. The post-dispatch
      # verification step below uses this as the lower bound when polling for
      # the corresponding repository_dispatch workflow run.
      - name: Record dispatch timestamp
        if: env.SHOULD_PUBLISH == 'true'
        id: dispatch-ts
        run: echo "iso=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Dispatch release-passed
        if: env.SHOULD_PUBLISH == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.pat_token || github.token }}
          repository: ${{ github.repository }}
          event-type: release-passed
          client-payload: '{"ref": "${{ steps.gem-tag-ref.outputs.value }}", "sha": "${{ github.sha }}", "type": "release-passed"}'

      # ============ Post-dispatch acknowledgement verification ============
      # Verify the release-passed dispatch was actually received and started
      # a downstream workflow run. The Dispatch step above reports success
      # when peter-evans/repository-dispatch returns 2xx from the GitHub
      # repository-dispatch API — that confirms the request was ACCEPTED by
      # GitHub, NOT that it was received and acted on by a downstream
      # workflow. The HTTP 422 silent-fail mode (metanorma/metanorma-cli#426
      # is the canonical instance: the receiver rejected the dispatch payload
      # shape because of a missing inputs declaration) would still report
      # green at the dispatch step, because the rejection happens in a
      # separate workflow run on the receiving side that nobody monitors.
      #
      # This step polls the same repo's workflow runs for one created after
      # the dispatch timestamp with event=repository_dispatch. Times out at
      # 90s. See metanorma/ci#302 ("dispatch accepted vs dispatch acted on"
      # observability gap) and metanorma/metanorma-cli#426 (the original
      # silent docker-rebuild failure that ran for 6 weeks unnoticed).
      - name: Verify release-passed dispatch acknowledged downstream
        if: env.SHOULD_PUBLISH == 'true'
        env:
          GH_TOKEN: ${{ secrets.pat_token || github.token }}
          REPO: ${{ github.repository }}
          SINCE: ${{ steps.dispatch-ts.outputs.iso }}
        run: |
          echo "Polling ${REPO} for a repository_dispatch workflow run created since ${SINCE}..."
          for i in $(seq 1 18); do
            # List recent repository_dispatch runs (created descending),
            # then jq-filter for runs created at-or-after our dispatch
            # timestamp. Pipe to jq directly so the --arg variable
            # injection works (gh api's --jq accepts only a single
            # expression, not jq's --arg flag).
            found=$(gh api "repos/${REPO}/actions/runs?event=repository_dispatch&per_page=10" \
              | jq -r --arg since "$SINCE" \
                  '.workflow_runs[] | select(.created_at >= $since) | "\(.id) \(.name // "?") \(.status)/\(.conclusion // "?") created=\(.created_at)"' \
              | head -1)
            if [[ -n "$found" ]]; then
              echo "✓ Downstream repository_dispatch run found:"
              echo "  $found"
              exit 0
            fi
            echo "  attempt $i/18: no matching run yet, sleeping 5s..."
            sleep 5
          done
          echo "::error::No repository_dispatch workflow run was created within 90s of the release-passed dispatch."
          echo "::error::Either no workflow listens for repository_dispatch types: [release-passed] in ${REPO}, or the dispatch was rejected silently (the class metanorma/metanorma-cli#426 was filed to surface)."
          echo "::error::Inspect https://github.com/${REPO}/actions for repository_dispatch runs near the timestamp ${SINCE}."
          exit 1
