name: 'ffmpeg-setup-action'
description: 'Installs ffmpeg for all OSes'
runs:
  using: "composite"
  steps:
    - shell: python
      run: |
        import sys, os
        sys.path.insert(0, os.path.join(os.environ['GITHUB_ACTION_PATH'], '..', '_shared'))
        from tool_runner import get_platform_name, run_commands

        platform_name = get_platform_name()
        run_commands({
          "Darwin": [
            "brew install ffmpeg",
            "ffmpeg -version"
          ],
          "Windows": [
            "choco install --no-progress -y ffmpeg",
            "ffmpeg -version"
          ],
          "Ubuntu": [
            "sudo apt install -y ffmpeg",
            "which ffmpeg",
            "ffmpeg -version"
          ],
        }.get(platform_name, [
          "echo 'Unsupported platform: {}'".format(platform_name),
          "exit 1"
        ]))
